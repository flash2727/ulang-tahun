<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kartu Ucapan Ulang Tahun</title>

<style>

body{
  font-family: Arial, sans-serif;
  text-align:center;
  background: linear-gradient(135deg,#ff9a9e,#fad0c4);
  padding:50px;
  overflow:hidden;
}

/* CARD */

.card{
  background:white;
  padding:30px;
  border-radius:15px;
  box-shadow:0 8px 20px rgba(0,0,0,0.2);
  max-width:400px;
  margin:auto;
  animation:pop 1s ease;
}

@keyframes pop{
  0%{transform:scale(0.7); opacity:0;}
  100%{transform:scale(1); opacity:1;}
}

h1{
  color:#ff4081;
}

p{
  font-size:16px;
}

/* BUTTON */

.share-btn{
  margin-top:20px;
  padding:12px 20px;
  background:#ff4081;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-size:15px;
  transition:0.3s;
}

.share-btn:hover{
  background:#e91e63;
}

/* CONFETTI */

.confetti{
  position:absolute;
  width:10px;
  height:10px;
  top:-10px;
  animation:fall 3s linear forwards;
}

@keyframes fall{
  to{
    transform:translateY(100vh) rotate(720deg);
    opacity:0;
  }
}

/* FOOTER */

footer{
  margin-top:25px;
  font-size:12px;
  color:#555;
}

</style>
</head>

<body>

<div class="card">

<h1>🎉 Selamat Ulang Tahun 🎂</h1>

<p id="message">
Semoga panjang umur, sehat selalu, dan semua impianmu tercapai.
Hari ini adalah hari spesialmu! ✨
</p>

<button class="share-btn" onclick="shareCard()">📤 Bagikan Link</button>

<footer>
Dibuat dengan 💖
</footer>

</div>


<script>

/* CONFETTI EFFECT */

function confettiEffect(){

for(let i=0;i<40;i++){

let confetti=document.createElement("div");
confetti.className="confetti";

confetti.style.left=Math.random()*window.innerWidth+"px";
confetti.style.background=
"rgb("+Math.random()*255+","+Math.random()*255+","+Math.random()*255+")";

document.body.appendChild(confetti);

setTimeout(()=>confetti.remove(),3000);

}

}

confettiEffect();

/* SHARE BUTTON */

function shareCard(){

const url=window.location.href;

if(navigator.share){

navigator.share({
title:'Kartu Ucapan Ulang Tahun',
text:'Lihat kartu ucapan ulang tahun ini 🎉',
url:url
});

}else{

navigator.clipboard.writeText(url);
alert("Link kartu ucapan sudah disalin:\n"+url);

}

}

</script>

</body>
</html>
